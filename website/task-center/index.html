<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理 - 无人机智能巡检管控系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="skin-default-dark fixed-layout">
    <div id="main-wrapper">
        <header class="topbar">
            <nav class="navbar top-navbar navbar-expand-md navbar-dark">
                <div class="navbar-header">
                    <a class="navbar-brand" href="../index/index.html">
                        <span class="brand-mark">UAV</span>
                        <span class="brand-copy">无人机智能巡检管控系统</span>
                    </a>
                </div>
                <div class="navbar-collapse d-flex justify-content-between align-items-center">
                    <ul class="navbar-nav mr-auto top-links">
                        <li class="nav-item"><a class="nav-link active" href="index.html">作业中心</a></li>
                        <li class="nav-item"><a class="nav-link" href="object_detection.html">图像检测</a></li>
                        <li class="nav-item"><a class="nav-link" href="../route-plan/index.html">航线规划</a></li>
                        <li class="nav-item"><a class="nav-link" href="../index/index.html">首页</a></li>
                    </ul>
                    <ul class="navbar-nav my-lg-0">
                        <li class="nav-item dropdown">
                            <span id="userPanel" class="nav-link user-chip">管理员：admin</span>
                        </li>
                    </ul>
                </div>
            </nav>
        </header>

        <aside class="left-sidebar">
            <div class="d-flex no-block nav-text-box align-items-center">
                <span class="sidebar-brand">UAV</span>
                <a class="waves-effect waves-dark ml-auto hidden-sm-down" href="javascript:void(0)"><i class="ti-menu"></i></a>
                <a class="nav-toggler waves-effect waves-dark ml-auto hidden-sm-up" href="javascript:void(0)"><i class="ti-menu ti-close"></i></a>
            </div>
            <div class="scroll-sidebar">
                <nav class="sidebar-nav">
                    <ul id="sidebarnav">
                        <li><a class="waves-effect waves-dark active" href="index.html"><i class="fa fa-tasks"></i><span class="hide-menu">任务管理</span></a></li>
                        <li><a class="waves-effect waves-dark" href="object_detection.html"><i class="fa fa-eye"></i><span class="hide-menu">图像检测</span></a></li>
                        <li><a class="waves-effect waves-dark" href="../route-plan/index.html"><i class="fa fa-map-o"></i><span class="hide-menu">航线规划</span></a></li>
                        <li><a class="waves-effect waves-dark" href="../index/index.html"><i class="fa fa-home"></i><span class="hide-menu">首页</span></a></li>
                    </ul>
                </nav>
            </div>
        </aside>

        <div class="page-wrapper">
            <div class="container-fluid">
                <div class="row page-titles">
                    <div class="col-md-5 align-self-center">
                        <h4 class="text-themecolor">任务管理</h4>
                    </div>
                    <div class="col-md-7 align-self-center text-right">
                        <div class="d-flex justify-content-end align-items-center">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a href="../index/index.html">Home</a></li>
                                <li class="breadcrumb-item active">任务管理</li>
                            </ol>
                            <a class="btn btn-success d-none d-lg-block m-l-15" href="../route-plan/index.html">航线规划</a>
                        </div>
                    </div>
                </div>

                <div class="card mb-3">
                    <div class="card-body">
                        <div class="filter-grid">
                            <label>任务名称
                                <input id="taskName" class="form-control" type="text" placeholder="请输入任务名称">
                            </label>
                            <label>任务类型
                                <select id="taskType" class="form-control">
                                    <option value="all">全部</option>
                                    <option value="周期性任务">周期性任务</option>
                                    <option value="单次性任务">单次性任务</option>
                                </select>
                            </label>
                            <label>执行周期
                                <select id="taskCycle" class="form-control">
                                    <option value="all">全部</option>
                                    <option value="每天">每天</option>
                                    <option value="每3天">每3天</option>
                                    <option value="每7天">每7天</option>
                                    <option value="每30天">每30天</option>
                                    <option value="单次">单次</option>
                                </select>
                            </label>
                            <label>任务状态
                                <select id="taskStatus" class="form-control">
                                    <option value="all">全部</option>
                                    <option value="执行中">执行中</option>
                                    <option value="已完成">已完成</option>
                                    <option value="待执行">待执行</option>
                                    <option value="已取消">已取消</option>
                                </select>
                            </label>
                        </div>
                        <div class="filter-actions">
                            <button id="resetBtn" class="btn btn-outline-secondary" type="button">重置</button>
                            <button id="searchBtn" class="btn btn-success" type="button">搜索</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="toolbar">
                            <button id="createTaskBtn" class="btn btn-success" type="button">新增任务</button>
                            <button id="downloadBtn" class="btn btn-outline-secondary" type="button">批量下载</button>
                        </div>

                        <div class="table-wrap">
                            <table class="table table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th>序号</th>
                                        <th>任务名称</th>
                                        <th>任务类型</th>
                                        <th>执行周期</th>
                                        <th>任务状态</th>
                                        <th>开始时间</th>
                                        <th>结束时间</th>
                                        <th>累计执行</th>
                                        <th>启用</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="taskTableBody"></tbody>
                            </table>
                        </div>

                        <div class="pagination">
                            <span id="summary"></span>
                            <div class="page-actions">
                                <button id="prevPage" class="btn btn-outline-secondary" type="button">上一页</button>
                                <span id="pageText"></span>
                                <button id="nextPage" class="btn btn-outline-secondary" type="button">下一页</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="taskModal" class="task-modal hidden">
        <div class="task-modal-card">
            <div class="task-modal-header">
                <h3 id="taskModalTitle">新增任务</h3>
                <button id="taskModalClose" class="task-modal-close" type="button">×</button>
            </div>

            <div class="task-form-grid">
                <label>任务名称<input id="formName" class="form-control" type="text" placeholder="请输入任务名称"></label>
                <label>任务类型
                    <select id="formType" class="form-control">
                        <option value="周期性任务">周期性任务</option>
                        <option value="单次性任务">单次性任务</option>
                    </select>
                </label>
                <label>执行周期
                    <select id="formCycle" class="form-control">
                        <option value="每天">每天</option>
                        <option value="每3天">每3天</option>
                        <option value="每7天">每7天</option>
                        <option value="每30天">每30天</option>
                        <option value="单次">单次</option>
                    </select>
                </label>
                <label>任务状态
                    <select id="formStatus" class="form-control">
                        <option value="执行中">执行中</option>
                        <option value="已完成">已完成</option>
                        <option value="待执行" selected>待执行</option>
                        <option value="已取消">已取消</option>
                    </select>
                </label>
                <label>开始时间<input id="formStartTime" class="form-control" type="text" placeholder="例如 2026-04-10 09:00"></label>
                <label>结束时间<input id="formEndTime" class="form-control" type="text" placeholder="例如 2026-04-30"></label>
                <label>已执行次数<input id="formExecutedDone" class="form-control" type="number" min="0" value="0"></label>
                <label>总执行次数<input id="formExecutedTotal" class="form-control" type="number" min="1" value="1"></label>
                <label>启用状态
                    <select id="formEnabled" class="form-control">
                        <option value="true" selected>启用</option>
                        <option value="false">禁用</option>
                    </select>
                </label>
            </div>

            <p id="taskFormTip" class="task-form-tip"></p>

            <div class="task-modal-actions">
                <button id="taskModalSubmit" class="btn btn-success" type="button">保存</button>
                <button id="taskModalCancel" class="btn btn-outline-secondary" type="button">取消</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
