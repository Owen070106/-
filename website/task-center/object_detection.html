<!DOCTYPE html>
<head>
    <title>目标检测系统</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="这是一个关于无人机巡检系统的目标检测页面">
    <link rel="stylesheet" href="odstyle.css">
</head>
<body>
    <!-- 顶部标题栏 -->
    <div id="title">
        无人机拍摄目标检测系统
        <button id="backBtn" onclick="history.back()">返回</button>
    </div>

    <!-- 中间上传区域 -->
    <!-- 中间上传区域 -->
<div class="upload-container">
    <h2>上传检测图片</h2>
    <!-- 1. 添加 id 方便 JS 获取 -->
    <input type="file" id="fileInput" accept="image/*">
    <button class="upload-btn" onclick="uploadAndDetect()">开始检测</button>
    
    <!-- 显示结果的区域 -->
    <div id="resultArea" style="margin-top: 20px; color: #00ff00; font-size: 14px;"></div>
</div>

<script>
    async function uploadAndDetect() {
        const fileInput = document.getElementById('fileInput');
        const resultArea = document.getElementById('resultArea');
        
        if (fileInput.files.length === 0) {
            alert("请先选择文件！");
            return;
        }

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        resultArea.innerText = "正在检测中...";

        try {
            // 2. 发送请求给 Python 后端
            const response = await fetch('http://127.0.0.1:8000/api/upload', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            
            if (data.result.status === 'success') {
                // 3. 显示结果
                resultArea.innerText = `检测到 ${data.result.objects.length} 个目标！`;
                alert(`检测完成！发现：${data.result.objects.map(o => o.label).join(', ')}`);
            } else {
                resultArea.innerText = "检测失败";
            }

        } catch (error) {
            console.error('Error:', error);
            resultArea.innerText = "连接服务器失败";
        }
    }
</script>

    <style>
        /* --- 顶部栏样式 (保持你之前的设置并优化) --- */
        body {
            margin: 0;
            /* 关键：让 body 至少占满整个屏幕高度 */
            min-height: 100vh; 
            /* 关键：使用 Flex 布局让内容垂直排列并居中 */
            display: flex;
            flex-direction: column;
            align-items: center; /* 水平居中 */
            background-image: url('../login/image/login_background.png');
            background-size:cover;
            background-repeat: no-repeat;
            background-attachment:fixed;
            min-height: 100vh;
            background-color: #f0f2f5; /* 给页面加个浅灰背景，突出半透明效果 */
        }

        #title {
            height: 64px;
            width: 100%; /* 占满宽度 */
            background-color: #22252b;
            font-size: 30px;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            font-weight: 700;
            color: white;
            padding-left: 20px;
            padding-right: 20px;
            
            /* Flex 布局：文字在左，按钮在右，垂直居中 */
            display: flex;
            justify-content: space-between;
            align-items: center;
            
            /* 关键：防止 flex 收缩，保持高度 */
            flex-shrink: 0; 
            box-sizing: border-box;
        }

        #backBtn {
            background-color: #444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        #backBtn:hover {
            background-color: #555;
        }

        /* --- 中间上传框样式 --- */
        .upload-container {
            /* 尺寸 */
            width: 400px;       /* 宽度 */
            height: 500px;      /* 高度：竖长方形 */
            
            /* 背景半透明：使用 rgba (红, 绿, 蓝, 透明度) */
            /* 这里设置为深灰色背景，0.6 透明度 */
            background-color: rgba(34, 37, 43, 0.142); 
            
            /* 或者如果你想要白色半透明磨砂玻璃效果，用这行： */
            /* background-color: rgba(255, 255, 255, 0.25); */

            /* 布局 */
            margin-top: 50px;   /* 距离顶部一点距离 */
            border-radius: 15px;/* 圆角 */
            
            /* 内容居中 */
            display: flex;
            flex-direction: column; /* 竖向排列子元素 */
            justify-content: center; /* 垂直居中 */
            align-items: center;     /* 水平居中 */
            
            /* 文字颜色 */
            color: white;
            
            /* 边框阴影（可选，增加立体感） */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px); /* 毛玻璃模糊效果（可选） */
        }

        /* 输入框和按钮的美化 */
        input[type="file"] {
            margin: 20px 0;
            font-size: 16px;
            color: #ddd;
        }

        .upload-btn {
            padding: 10px 30px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .upload-btn:hover {
            background-color: #0056b3;
        }
    </style>
</body>
