<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图像检测 - 无人机智能巡检管控系统</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detect-grid {
            display: grid;
            grid-template-columns: minmax(300px, 380px) 1fr;
            gap: 14px;
        }

        .upload-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .hint {
            color: var(--text-sub);
            font-size: 13px;
        }

        .img-stage {
            min-height: 360px;
            border: 1px dashed #c5ccd8;
            border-radius: 8px;
            background: #f8fafc;
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .img-stage img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .img-empty {
            color: #8a94a6;
            font-size: 14px;
        }

        .result-list {
            margin: 0;
            padding-left: 18px;
            color: #374151;
            font-size: 14px;
        }

        .status {
            min-height: 22px;
            color: #1d4ed8;
            font-size: 14px;
        }

        .history-list {
            margin: 0;
            padding-left: 18px;
            font-size: 14px;
            color: #374151;
        }

        .history-list li {
            margin: 8px 0;
        }

        .realtime-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-top: 6px;
        }

        .realtime-controls input {
            width: 110px;
            padding: 6px 8px;
            border: 1px solid #c5ccd8;
            border-radius: 6px;
        }

        .model-picker {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .model-picker select {
            max-width: 260px;
            padding: 6px 8px;
            border: 1px solid #c5ccd8;
            border-radius: 6px;
            background: #fff;
        }

        @media (max-width: 1080px) {
            .detect-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="brand">无人机智能巡检管控系统</div>
        <nav class="topnav">
            <a href="#">管控中心</a>
            <a class="active" href="index.html">作业中心</a>
            <a href="#">飞控中心</a>
            <a href="#">系统中心</a>
        </nav>
        <div id="userPanel" class="user-panel">管理员：admin</div>
    </header>

    <main class="layout">
        <aside class="sidebar">
            <a class="menu-item" href="index.html">任务管理</a>
            <a class="menu-item active" href="object_detection.html">图像检测</a>
            <a class="menu-item" href="#">任务记录</a>
            <a class="menu-item" href="../route-plan/index.html">航线规划</a>
            <a class="menu-item" href="#">巡检对象管理</a>
            <a class="menu-item" href="#">禁飞区管理</a>
        </aside>

        <section class="content">
            <div class="crumb">作业中心 / 图像检测</div>

            <section class="card detect-grid">
                <div class="upload-box">
                    <label>选择检测图片
                        <input id="fileInput" type="file" accept="image/*">
                    </label>
                    <div class="model-picker">
                        <label for="modelSelect">选择检测模型</label>
                        <select id="modelSelect"></select>
                    </div>
                    <div class="hint">支持 JPG、PNG 等常见格式，点击按钮后将调用后端 YOLOv26 模型。</div>
                    <button id="detectBtn" class="btn btn-primary">上传并检测</button>
                    <div class="realtime-controls">
                        <button id="startRealtimeBtn" class="btn">开启实时查看</button>
                        <button id="stopRealtimeBtn" class="btn">停止实时查看</button>
                        <label>刷新(ms)
                            <input id="realtimeInterval" type="number" min="200" step="100" value="1000">
                        </label>
                    </div>
                    <div id="statusText" class="status"></div>
                    <div>
                        <strong>检测目标</strong>
                        <ul id="resultList" class="result-list"></ul>
                    </div>
                </div>

                <div>
                    <div class="hint">结果图（含检测框）</div>
                    <div id="resultStage" class="img-stage">
                        <span class="img-empty">检测完成后在此展示结果图</span>
                    </div>
                </div>
            </section>

            <section class="card">
                <div class="hint">最近检测记录</div>
                <ul id="historyList" class="history-list"></ul>
            </section>
        </section>
    </main>

    <script>
        const API_BASE = "http://127.0.0.1:8000";
        const refs = {
            userPanel: document.getElementById("userPanel"),
            fileInput: document.getElementById("fileInput"),
            modelSelect: document.getElementById("modelSelect"),
            detectBtn: document.getElementById("detectBtn"),
            startRealtimeBtn: document.getElementById("startRealtimeBtn"),
            stopRealtimeBtn: document.getElementById("stopRealtimeBtn"),
            realtimeInterval: document.getElementById("realtimeInterval"),
            statusText: document.getElementById("statusText"),
            resultList: document.getElementById("resultList"),
            resultStage: document.getElementById("resultStage"),
            historyList: document.getElementById("historyList")
        };

        const rtState = {
            timer: null,
            lastId: 0
        };

        const modelState = {
            loaded: false,
            selected: ""
        };

        function initUserPanel() {
            const raw = localStorage.getItem("uav_user");
            if (!raw) {
                window.location.href = "../login/login.html";
                return;
            }

            try {
                const user = JSON.parse(raw);
                const displayName = user.displayName || user.username || "未知用户";
                refs.userPanel.textContent = `管理员：${displayName}`;
            } catch (error) {
                localStorage.removeItem("uav_user");
                window.location.href = "../login/login.html";
            }
        }

        function setStatus(text, isError = false) {
            refs.statusText.textContent = text;
            refs.statusText.style.color = isError ? "#b91c1c" : "#1d4ed8";
        }

        function renderResultImage(url) {
            if (!url) {
                refs.resultStage.innerHTML = '<span class="img-empty">未生成结果图</span>';
                return;
            }

            const img = document.createElement("img");
            img.alt = "检测结果图";
            img.src = `${API_BASE}${url}?t=${Date.now()}`;

            refs.resultStage.innerHTML = "";
            refs.resultStage.appendChild(img);
        }

        function renderObjects(objects) {
            if (!Array.isArray(objects) || objects.length === 0) {
                refs.resultList.innerHTML = "<li>未检测到目标</li>";
                return;
            }

            refs.resultList.innerHTML = objects.map((item) => {
                const conf = (Number(item.confidence) * 100).toFixed(2);
                return `<li>${item.label}（置信度 ${conf}%）</li>`;
            }).join("");
        }

        function renderHistory(items) {
            if (!Array.isArray(items) || items.length === 0) {
                refs.historyList.innerHTML = "<li>暂无检测记录</li>";
                return;
            }

            refs.historyList.innerHTML = items.map((item) => {
                const result = item.status === "success" ? "成功" : "失败";
                return `<li>${item.createdAt} | ${item.filename} | ${result} | 目标数: ${item.objectCount}</li>`;
            }).join("");
        }

        async function loadHistory() {
            const response = await fetch(`${API_BASE}/api/detections?limit=20`);
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.detail || "检测记录加载失败");
            }
            renderHistory(data.items);
        }

        async function loadModels() {
            const response = await fetch(`${API_BASE}/api/models`);
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.detail || "模型列表加载失败");
            }

            const items = Array.isArray(data.items) ? data.items : [];
            if (items.length === 0) {
                refs.modelSelect.innerHTML = '<option value="">默认模型</option>';
                modelState.loaded = true;
                return;
            }

            refs.modelSelect.innerHTML = items.map((item) => {
                const selected = item.isDefault ? "selected" : "";
                return `<option value="${item.name}" ${selected}>${item.name}${item.isDefault ? " (默认)" : ""}</option>`;
            }).join("");

            modelState.selected = refs.modelSelect.value || data.default || "";
            modelState.loaded = true;
        }

        async function loadLatestDetection() {
            const response = await fetch(`${API_BASE}/api/detections/latest`);
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.detail || "最新记录加载失败");
            }

            const item = data.item;
            if (!item || item.id === rtState.lastId) {
                return;
            }

            rtState.lastId = item.id;
            if (item.resultImageUrl) {
                renderResultImage(item.resultImageUrl);
            }

            refs.resultList.innerHTML = `<li>最近一次检测目标数：${item.objectCount}</li>`;
            setStatus(`实时更新：${item.createdAt} | ${item.status} | 目标数 ${item.objectCount}`, item.status !== "success");
            await loadHistory();
        }

        function stopRealtimeMode() {
            if (rtState.timer) {
                clearInterval(rtState.timer);
                rtState.timer = null;
            }
            setStatus("已停止实时查看");
        }

        function startRealtimeMode() {
            stopRealtimeMode();
            const interval = Math.max(200, Number(refs.realtimeInterval.value) || 1000);
            refs.realtimeInterval.value = String(interval);
            setStatus("实时查看已开启，等待新检测帧...");

            loadLatestDetection().catch((error) => {
                setStatus(`实时更新失败：${error.message}`, true);
            });

            rtState.timer = setInterval(() => {
                loadLatestDetection().catch((error) => {
                    setStatus(`实时更新失败：${error.message}`, true);
                });
            }, interval);
        }

        async function detectImage() {
            const file = refs.fileInput.files[0];
            if (!file) {
                setStatus("请先选择图片文件", true);
                return;
            }

            const formData = new FormData();
            formData.append("file", file);
            formData.append("model_name", refs.modelSelect.value || "");
            refs.detectBtn.disabled = true;
            setStatus("正在上传并检测，请稍候...");
            refs.resultList.innerHTML = "";

            try {
                const response = await fetch(`${API_BASE}/api/detect`, {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.message || "请求失败");
                }

                if (!data.result || data.result.status !== "success") {
                    throw new Error((data.result && data.result.message) || "检测失败");
                }

                renderObjects(data.result.objects);
                renderResultImage(data.result.result_image_url);
                const usingModel = data.result.model || refs.modelSelect.value || "默认模型";
                setStatus(`检测完成，共识别 ${data.result.objects.length} 个目标，模型：${usingModel}`);
                await loadHistory();
            } catch (error) {
                setStatus(`检测失败：${error.message}`, true);
                refs.resultList.innerHTML = "<li>请检查后端服务与模型配置</li>";
            } finally {
                refs.detectBtn.disabled = false;
            }
        }

        refs.detectBtn.addEventListener("click", detectImage);
        refs.startRealtimeBtn.addEventListener("click", startRealtimeMode);
        refs.stopRealtimeBtn.addEventListener("click", stopRealtimeMode);
        refs.modelSelect.addEventListener("change", () => {
            modelState.selected = refs.modelSelect.value || "";
        });

        loadModels().catch((error) => {
            refs.modelSelect.innerHTML = '<option value="">默认模型</option>';
            setStatus(`模型列表加载失败：${error.message}`, true);
        });

        loadHistory().catch((error) => {
            refs.historyList.innerHTML = `<li>${error.message}</li>`;
        });

        initUserPanel();
    </script>
</body>
</html>
